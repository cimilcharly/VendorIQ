services:
  - type: web
    name: vendoriq-backend
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vendoriq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vendoriq-redis
          type: redis
          property: connectionString
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: vendoriq-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: vendoriq-backend
          type: web
          property: url

databases:
  - name: vendoriq-db
    plan: free

interfaces:
  - type: redis
    name: vendoriq-redis
    plan: free
